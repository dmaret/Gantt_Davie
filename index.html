<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="logo">◆</span>
      <span class="title">Atelier · Planification</span>
      <span class="brand-owner" title="Davie MARET — MSP · Atelier Conditionnement & Logistique · EPI Genève · v3.0">DM</span>
    </div>
    <nav class="nav">
      <button data-view="dashboard" class="nav-btn active">Tableau de bord</button>
      <button data-view="gantt" class="nav-btn">Gantt</button>
      <button data-view="kanban" class="nav-btn">Kanban</button>
      <button data-view="calendrier" class="nav-btn">Calendrier</button>
      <button data-view="personnes" class="nav-btn nav-sep">Personnes</button>
      <button data-view="lieux" class="nav-btn">Lieux</button>
      <button data-view="machines" class="nav-btn">Machines</button>
      <button data-view="flux" class="nav-btn">Flux</button>
      <button data-view="projets" class="nav-btn nav-sep">Projets</button>
      <button data-view="stock" class="nav-btn">Stock</button>
      <button data-view="bom" class="nav-btn">BOM</button>
      <button data-view="deplacements" class="nav-btn">Déplacements</button>
      <button data-view="commandes" class="nav-btn">Commandes</button>
      <button data-view="capacite" class="nav-btn nav-sep">Capacité</button>
      <button data-view="ressources" class="nav-btn">Ressources</button>
      <button data-view="equipes" class="nav-btn">Équipes</button>

      <button data-view="modeles" class="nav-btn nav-sep">Modèles</button>
      <button data-view="modelesprojets" class="nav-btn">Modèles projet</button>
      <button data-view="audit" class="nav-btn">Historique</button>
      <button data-view="whatif" class="nav-btn">What-if</button>
      <button data-view="majourney" class="nav-btn">Ma journée</button>
      <button data-view="timeline" class="nav-btn">Timeline</button>
      <button data-view="aide" class="nav-btn">🎓 Guide</button>
    </nav>
    <div class="actions">
      <select id="user-select" class="user-select" title="Utilisateur courant (pour signer les validations 4A)"></select>
      <span id="user-badge" class="user-badge" title="Groupe de l'utilisateur courant"></span>
      <button id="btn-bell" class="btn-ghost bell" title="Alertes proactives"><span class="bell-icon">🔔</span><span id="bell-count" class="bell-count hidden">0</span></button>
      <input type="file" id="import-file" accept=".json" hidden>
      <button id="btn-admin" class="btn-ghost" data-perm="admin" title="Administration utilisateurs & groupes">⚙</button>
      <button id="btn-password" class="btn-ghost" title="Mon mot de passe">🔑</button>
      <button id="btn-logout" class="btn-ghost" title="Se déconnecter">🚪</button>
      <button id="btn-tuto" class="btn-ghost" title="Mode d'emploi / Tutoriel">🎓</button>
      <button id="btn-import" class="btn-ghost" data-perm="admin" title="Importer un JSON">Importer</button>
      <button id="btn-export" class="btn-ghost" data-perm="admin" title="Exporter en JSON">Exporter</button>
      <button id="btn-print" class="btn-ghost" title="Imprimer la vue (PDF)">⎙</button>
      <button id="btn-help" class="btn-ghost" title="Raccourcis clavier (?)">?</button>
      <button id="btn-tablette" class="btn-ghost" title="Mode tablette atelier (lecture seule)">📋</button>
      <button id="btn-reset" class="btn-ghost" data-perm="reset" title="Réinitialiser aux données de démonstration">Reset</button>
      <span class="nav-hist-sep"></span>
      <button id="btn-back" class="btn-ghost btn-nav-hist" title="Vue précédente (Alt+←)" hidden>‹</button>
      <button id="btn-fwd" class="btn-ghost btn-nav-hist" title="Vue suivante (Alt+→)" hidden>›</button>
      <button id="btn-theme" class="btn-ghost" title="Basculer thème">☾</button>
    </div>
  </header>

  <div id="searchbar-wrap">
    <div id="searchbar-inner">
      <span id="searchbar-icon">🔍</span>
      <input type="search" id="searchbar-input" placeholder="Rechercher une tâche, un projet, une personne, un article… (/ pour focus)" autocomplete="off" spellcheck="false">
      <kbd id="searchbar-kbd">Ctrl+K</kbd>
    </div>
    <div id="searchbar-results" class="sb-results hidden"></div>
  </div>

  <main id="view-root"></main>

  <div id="modal-root" class="modal-root hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <header class="modal-head">
        <h3 id="modal-title">Titre</h3>
        <button class="modal-close" aria-label="Fermer">×</button>
      </header>
      <div class="modal-body" id="modal-body"></div>
      <footer class="modal-foot" id="modal-foot"></footer>
    </div>
  </div>

  <div id="toast-root" class="toast-root"></div>

  <footer class="app-footer">
    Planification d'atelier &nbsp;·&nbsp; <strong>Davie MARET</strong> — MSP &nbsp;·&nbsp; Atelier Conditionnement &amp; Logistique &nbsp;·&nbsp; v3.0 &nbsp;·&nbsp; 2026
  </footer>
</div>
